name: 🧠 AutoGrow — pSEO Content Engine

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AutoGrow script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BATCH_SIZE: '5'
        run: node scripts/autogrow.mjs

      - name: Commit & push nuevos datos
        run: |
          git config --global user.name "AutoGrow Bot"
          git config --global user.email "bot@tusitio.com"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 AutoGrow: nuevas páginas pSEO"
          git push
